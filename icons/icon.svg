<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo verde -->
  <rect width="512" height="512" rx="96" fill="#0c8233"/>
  <!-- Figura corriendo (running man) -->
  <!-- Cabeza -->
  <circle cx="290" cy="128" r="36" fill="#e8ff47"/>
  <!-- Cuerpo inclinado -->
  <line x1="290" y1="164" x2="256" y2="290" stroke="#e8ff47" stroke-width="22" stroke-linecap="round"/>
  <!-- Brazo izquierdo (adelante) -->
  <line x1="275" y1="210" x2="200" y2="260" stroke="#e8ff47" stroke-width="18" stroke-linecap="round"/>
  <!-- Brazo derecho (atrás) -->
  <line x1="275" y1="210" x2="336" y2="240" stroke="#e8ff47" stroke-width="18" stroke-linecap="round"/>
  <!-- Pierna izquierda (adelante) -->
  <line x1="256" y1="290" x2="210" y2="370" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>
  <line x1="210" y1="370" x2="168" y2="400" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>
  <!-- Pierna derecha (atrás) -->
  <line x1="256" y1="290" x2="310" y2="360" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>
  <line x1="310" y1="360" x2="360" y2="390" stroke="#e8ff47" stroke-width="20" stroke-linecap="round"/>
  <!-- Texto RUN -->
  <text x="256" y="470" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="#e8ff47" text-anchor="middle" letter-spacing="8">RUN</text>
</svg>
